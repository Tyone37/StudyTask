<a class="dashboard-card" [routerLink]="link">
  <span class="card-icon">
    <app-icon [name]="icon"></app-icon>
  </span>
  <span class="card-copy">
    <span class="card-title">{{ title }}</span>
    <strong>{{ value }}</strong>
    <span class="card-desc">{{ description }}</span>
  </span>
</a>
